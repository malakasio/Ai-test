# v5 fix: copytruncate (not rename — Python file descriptor stays open)
# Python's RotatingFileHandler handles jarvis.log itself
# This config is for OTHER logs (not jarvis.log which Python rotates)

/home/jarvis/jarvis/logs/audit.jsonl {
    daily
    rotate 30
    compress
    copytruncate
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
}
